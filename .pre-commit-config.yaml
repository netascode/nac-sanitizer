repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff (lint)
        entry: ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff (format)
        entry: ruff format
        language: system
        types: [python]

      - id: ty
        name: ty (type check)
        entry: ty check
        language: system
        types: [python]
        pass_filenames: false

      - id: bandit
        name: bandit (security)
        entry: bandit -c pyproject.toml
        language: system
        types: [python]

repos:
  - repo: local
    hooks:
      - id: license-headers
        name: license headers (SPDX)
        entry: bash scripts/license-headers.sh
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-lint
        name: ruff (lint)
        entry: uv run ruff check --fix
        language: system
        types: [python]
        exclude: '_version\.py$'

      - id: ruff-format
        name: ruff (format)
        entry: uv run ruff format
        language: system
        types: [python]
        exclude: '_version\.py$'

      - id: ty
        name: ty (type check)
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false

      - id: bandit
        name: bandit (security)
        entry: uv run bandit -c pyproject.toml
        language: system
        types: [python]
